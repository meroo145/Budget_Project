<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <div class="logo glow">BudgetTracker</div>
    
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="analysis.html">Analysis</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="budgets.html">Budgets</a></li>
    </ul>

    <div class="nav-buttons">
        <a href="home.html" style="text-decoration: none;">
            <button class="btn btn-logout" onclick="logout()">Log Out</button>
        </a>
    </div>
</nav>

<div class="container">
    
    <header style="text-align: center; margin-top: 40px;">
        <h1 class="glow">Welcome to Budget App ✨</h1>
        <p>This is a clean purple glowing UI using a shared base stylesheet</p>
    </header>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
        
        <div class="card">
            <h3 class="glow">Total Balance</h3>
            <h2 style="font-size: 2rem;">$5,240</h2>
            <p style="color: #4ade80;">+12% from last month</p>
        </div>

        <div class="card">
            <h3 class="glow">Monthly Income</h3>
            <h2 style="font-size: 2rem;">$3,000</h2>
            <button class="btn" style="margin-top: 10px;">View History</button>
        </div>

        <div class="card">
            <h3 class="glow">Monthly Expenses</h3>
            <h2 style="font-size: 2rem; color: #f87171;">$1,850</h2>
            <button class="btn" style="margin-top: 10px;">Check Limits</button>
        </div>

    </div>

    <div class="quick-actions-box">
        <h3 class="glow">Quick Actions</h3>

        <div class="buttons-group">
            
            <a href="add.expense.html" class="action-btn no-underline">
                + Add Expense
            </a>

            <a href="add.income.html" class="action-btn no-underline">
                + Add Income
            </a>

            <button class="action-btn">
                Generate Report
            </button>

        </div>
    </div>

</div>

<script src="style.js"></script>

</body>
</html>
