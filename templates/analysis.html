<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Analysis & Notifications</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(rgba(15, 15, 26, 0.9), rgba(15, 15, 26, 0.95)), url('project.jpg');
            background-size: cover; background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif; color: white;
        }
       .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 50px; background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(192, 132, 252, 0.2); box-sizing: border-box;
        }
        .logo { font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px #c084fc; }
        .nav-links { list-style: none; display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: #ccc; }
        .nav-links a.active { color: #c084fc; text-shadow: 0 0 8px #c084fc; }

        .notification-toast {
            position: fixed; top: 80px; right: 20px;
            background: rgba(168, 85, 247, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid #c084fc;
            padding: 15px 25px; border-radius: 12px;
            display: none; 
            z-index: 2000;
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .container {
            padding-top: 100px; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        .analysis-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(192, 132, 252, 0.3);
            width: 90%; max-width: 800px; text-align: center;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; width: 90%; max-width: 800px; margin-top: 20px;
        }

        .stat-item {
            background: rgba(168, 85, 247, 0.05); padding: 20px; border-radius: 15px;
            border: 1px solid rgba(192, 132, 252, 0.2);
        }

        .stat-item h3 { margin: 0; color: #c084fc; font-size: 0.9rem; }
        .stat-item p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="noti" class="notification-toast">
        <span id="noti-msg">Hello! Your budget looks good.</span>
    </div>

    <nav class="navbar">
        <div class="logo">BudgetTracker</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Home</a></li>
            <!-- <li><a href="analysis.html" class="active">Analysis</a></li> -->
            <li><a href="history.html">History</a></li>
            <li><a href="budgets.html">Budgets</a></li>
        </ul>
        <button style="background:#ff4d4d; border:none; color:white; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
    </nav>

    <div class="container">
        <h2 style="text-shadow:0 0 10px #c084fc;">Financial Analysis</h2>

        <div class="stats-grid">
            <div class="stat-item">
                <h3>Total Income</h3>
                <p id="inc-val" style="color: #4ade80;">$0</p>
            </div>
            <div class="stat-item">
                <h3>Total Expenses</h3>
                <p id="exp-val" style="color: #f87171;">$0</p>
            </div>
        </div>

        <div class="analysis-card">
            <h3>Income vs Expenses Chart</h3>
            <canvas id="incomeChart"></canvas>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const transactions = JSON.parse(localStorage.getItem('myTransactions')) || [];
            
            let totalIn = 0;
            let totalEx = 0;

            transactions.forEach(t => {
                const amount = parseFloat(t.amt.replace(/[^0-9.-]+/g,""));
                if (t.type === 'in') totalIn += amount;
                else totalEx += Math.abs(amount);
            });

            document.getElementById('inc-val').innerText = `$${totalIn}`;
            document.getElementById('exp-val').innerText = `$${totalEx}`;

            const noti = document.getElementById('noti');
            const notiMsg = document.getElementById('noti-msg');

            if (totalEx > totalIn && totalIn > 0) {
                notiMsg.innerText = "⚠️ Warning: Your expenses exceeded your income!";
                noti.style.background = "rgba(248, 113, 113, 0.2)";
                noti.style.borderColor = "#f87171";
                noti.style.display = "block";
            } else if (transactions.length > 0) {
                notiMsg.innerText = "✅ Great! You've added new records recently.";
                noti.style.display = "block";
            }

            setTimeout(() => { noti.style.display = 'none'; }, 6000);

            const ctx = document.getElementById('incomeChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar', 
                data: {
                    labels: ['Income', 'Expenses'],
                    datasets: [{
                        label: 'Amount in $',
                        data: [totalIn, totalEx],
                        backgroundColor: ['#4ade80', '#f87171'],
                        borderRadius: 10
                    }]
                },
                options: {
                    scales: { y: { ticks: { color: 'white' } }, x: { ticks: { color: 'white' } } },
                    plugins: { legend: { display: false } }
                }
            });
        });
    </script>
</body>
</html>
