{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account - BudgetTracker</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background: linear-gradient(rgba(15, 15, 26, 0.8), rgba(15, 15, 26, 0.9)),
                        url("{% static 'project.jpg' %}");
            background-size: cover; background-position: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .signup-card {
            width: 100%; max-width: 400px; padding: 40px;
            text-align: center; backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(115, 12, 218, 0.4);
            border-radius: 20px; position: relative;
            animation: slideUp 0.6s ease-out;
        }
        .signup-card h2 { color: white; font-size: 2rem; margin-bottom: 30px; text-shadow: 0 0 10px rgba(123, 19, 227, 0.5); }
        .input-field {
            width: 100%; padding: 15px 20px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(192, 132, 252, 0.3);
            border-radius: 8px; color: white; font-size: 1rem;
            outline: none; transition: 0.3s ease; box-sizing: border-box;
        }
        .btn-submit {
            width: 100%; padding: 15px; margin-top: 15px;
            background: #a855f7; border: none; border-radius: 8px;
            color: white; font-size: 1rem; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { background: #9333ea; transform: translateY(-2px); }
        .close-link {
            position: absolute; top: 15px; right: 20px;
            font-size: 30px; color: #c084fc;
            text-decoration: none; transition: 0.3s;
        }
        .close-link:hover { color: rgb(216, 4, 4); transform: scale(1.2); }
        .error-msg { color: #f87171; font-size: 0.85rem; margin: 5px 0; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <a href="{% url 'home' %}" class="close-link">&times;</a>
        <h2 style="text-shadow: 0 0 10px #c084fc; color: #c084fc;">Create Account</h2>

        {% if messages %}
            {% for msg in messages %}
                <p class="error-msg">{{ msg }}</p>
            {% endfor %}
        {% endif %}

       <form method="POST" action="{% url 'signup_url' %}">
    {% csrf_token %}
    <input type="text" name="name" class="input-field" placeholder="Full Name" required>
    <input type="email" name="email" class="input-field" placeholder="Email" required>
    <input type="password" name="password" class="input-field" placeholder="Password" required>
    <input type="password" name="confirmPassword" class="input-field" placeholder="Confirm Password" required>
    <button type="submit" class="btn-submit">Create Account</button>
</form>

        <p style="margin-top: 20px; color: #ccc; font-size: 0.9rem;">
            Already have an account? <a href="{% url 'login_url' %}" style="color:#c084fc;">Login</a>
        </p>
    </div>
</body>
</html>
