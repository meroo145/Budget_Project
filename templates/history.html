<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - BudgetTracker</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(15, 15, 26, 0.9), rgba(15, 15, 26, 0.95)), url('project.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(192, 132, 252, 0.2);
        }

        .logo { font-size: 1.5rem; font-weight: bold; }
        .glow { text-shadow: 0 0 10px #c084fc, 0 0 20px #a855f7; color: white; }

        .nav-links { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: #ccc; transition: 0.3s; font-size: 0.9rem; }
        .nav-links a:hover, .nav-links a.active { color: #c084fc; text-shadow: 0 0 8px #c084fc; }

        .logout-btn {
            background: #ff4d4d;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .logout-btn:hover { background: #ff3333; box-shadow: 0 0 10px rgba(255, 77, 77, 0.4); }

        .main-container {
            padding-top: 120px;
            display: flex;
            justify-content: center;
            padding-bottom: 50px;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(192, 132, 252, 0.3);
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 0 0 15px rgba(192, 132, 252, 0.6);
        }

        .table-wrapper { overflow-x: auto; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            padding: 18px;
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
            border-bottom: 2px solid rgba(192, 132, 252, 0.3);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 15px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        tr:hover { background: rgba(255, 255, 255, 0.02); transition: 0.2s; }
        .amt-in { color: #4ade80; font-weight: bold; }
        .amt-ex { color: #f87171; font-weight: bold; }

        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            background: rgba(192, 132, 252, 0.1);
            border: 1px solid rgba(192, 132, 252, 0.3);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo glow">BudgetTracker</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Home</a></li>
            <li><a href= "analysis.html" >Analysis</a></li>
            <!-- <li><a href="history.html" class="active">History</a></li> -->
            <li><a href="budgets.html">Budgets</a></li>
        </ul>
       
    </nav>

    <div class="main-container">
        <div class="history-card">
            <h2 class="title glow">Transaction History</h2>
            
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                            <th>type</th>
                        </tr>
                    </thead>
                    <tbody id="historyData">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const tableBody = document.getElementById('historyData');
        const transactions = JSON.parse(localStorage.getItem('myTransactions')) || [];
        if (transactions.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No transactions yet!</td></tr>';
            return;
        }
        tableBody.innerHTML = ''; 
        transactions.forEach(t => {
            const row = `
                <tr>
                    <td>${t.date}</td>
                    <td>${t.desc}</td>
                    <td><span class="status-badge">${t.cat}</span></td>
                    <td class="${t.type === 'in' ? 'amt-in' : 'amt-ex'}">${t.amt}</td>
                    <td>${t.type === 'in' ? 'Deposit' : 'Expense'}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    });
</script>
</html>
