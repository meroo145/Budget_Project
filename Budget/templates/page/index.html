{% extends 'base.html' %}
{% load static %}

{% block title %}Home{% endblock %}

{% block content %}

<style>
/* ===== Welcome Page Styles ===== */

.home {
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.home-box {
    text-align: center;
    padding: 50px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(192, 132, 252, 0.2);
    box-shadow: 0 0 25px rgba(192, 132, 252, 0.2);
    backdrop-filter: blur(10px);
}

.home-box h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.home-box p {
    color: #ccc;
    margin-bottom: 30px;
    font-size: 18px;
}

/* Buttons container */
.home-buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
}

/* Customize buttons for this section */
.home-buttons .btn {
    padding: 12px 25px;
    font-size: 16px;
}

/* Fade-in animation */
.home-box {
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>


<div class="home">

    <div class="home-box">
        <h1 class="glow">💰 Budget Tracker</h1>

        <p>
            Take control of your finances with ease ✨  
            Track your expenses and manage your budget effectively.
        </p>

        <div class="home-buttons">
    <a href="#" class="btn">Login</a>
    <a href="#" class="btn">Sign Up</a>
</div>
    </div>

</div>

{% endblock %}
